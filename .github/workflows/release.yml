name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing version tag to publish or refresh"
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  github-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag_name || github.ref_name }}

      - name: Create GitHub release from release notes or CHANGELOG
        uses: actions/github-script@v9
        env:
          TAG_NAME: ${{ inputs.tag_name || github.ref_name }}
        with:
          script: |
            const fs = require("fs");
            const tag = process.env.TAG_NAME;
            const changelog = fs.readFileSync("CHANGELOG.md", "utf8");
            const pyproject = fs.readFileSync("pyproject.toml", "utf8");
            const releaseNotesPath = `docs/releases/${tag}.md`;
            const marker = `## ${tag} - `;
            const start = changelog.indexOf(marker);
            let notes = `# ${tag}\n\nRelease created from tag push.\n`;
            if (start === -1) {
              core.setFailed(`CHANGELOG.md does not contain a section for ${tag}`);
              return;
            }

            const versionMatch = pyproject.match(/^version = "([^"]+)"$/m);
            if (!versionMatch) {
              core.setFailed("pyproject.toml does not contain a project version");
              return;
            }

            const normalizedTag = tag.startsWith("v") ? tag.slice(1) : tag;
            if (versionMatch[1] !== normalizedTag) {
              core.setFailed(`pyproject.toml version ${versionMatch[1]} does not match tag ${tag}`);
              return;
            }

            if (fs.existsSync(releaseNotesPath)) {
              notes = fs.readFileSync(releaseNotesPath, "utf8").trim() + "\n";
            } else {
              const nextSection = changelog.indexOf("\n## ", start + marker.length);
              notes = changelog.slice(start, nextSection === -1 ? undefined : nextSection).trim() + "\n";
            }
            const releaseRequest = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              body: notes,
              draft: false,
              prerelease: false,
            };

            try {
              const existing = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: existing.data.id,
                name: tag,
                body: notes,
                draft: false,
                prerelease: false,
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
              await github.rest.repos.createRelease(releaseRequest);
            }

  windows-release-assets:
    needs: github-release
    runs-on: windows-latest
    env:
      TAG_NAME: ${{ inputs.tag_name || github.ref_name }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag_name || github.ref_name }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Set up repository-local virtual environment
        run: .\scripts\user\setup.ps1 -PythonPreference "$env:pythonLocation\python.exe"
      - name: Build Windows release artifacts
        run: .\scripts\developer\package_windows.ps1 -PythonExe ".\.venv\Scripts\python.exe" -Version "$env:TAG_NAME"
      - name: Upload workflow copy of release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: selfsnap-release-assets-${{ env.TAG_NAME }}
          path: |
            artifacts/windows/*.zip
            artifacts/windows/*.msi
            artifacts/windows/*-setup.exe
          if-no-files-found: error
          retention-days: 30
      - name: Upload release assets to GitHub release
        run: gh release upload $env:TAG_NAME artifacts/windows/*.zip artifacts/windows/*.msi artifacts/windows/*-setup.exe --clobber
