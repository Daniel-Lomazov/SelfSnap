name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing version tag to publish or refresh"
        required: true
        type: string

permissions:
  contents: write

jobs:
  github-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub release from release notes or CHANGELOG
        uses: actions/github-script@v7
        env:
          TAG_NAME: ${{ inputs.tag_name || github.ref_name }}
        with:
          script: |
            const fs = require("fs");
            const tag = process.env.TAG_NAME;
            const changelog = fs.readFileSync("CHANGELOG.md", "utf8");
            const pyproject = fs.readFileSync("pyproject.toml", "utf8");
            const releaseNotesPath = `docs/releases/${tag}.md`;
            const marker = `## ${tag} - `;
            const start = changelog.indexOf(marker);
            let notes = `# ${tag}\n\nRelease created from tag push.\n`;
            if (start === -1) {
              core.setFailed(`CHANGELOG.md does not contain a section for ${tag}`);
              return;
            }

            const versionMatch = pyproject.match(/^version = "([^"]+)"$/m);
            if (!versionMatch) {
              core.setFailed("pyproject.toml does not contain a project version");
              return;
            }

            const normalizedTag = tag.startsWith("v") ? tag.slice(1) : tag;
            if (versionMatch[1] !== normalizedTag) {
              core.setFailed(`pyproject.toml version ${versionMatch[1]} does not match tag ${tag}`);
              return;
            }

            if (fs.existsSync(releaseNotesPath)) {
              notes = fs.readFileSync(releaseNotesPath, "utf8").trim() + "\n";
            } else {
              const nextSection = changelog.indexOf("\n## ", start + marker.length);
              notes = changelog.slice(start, nextSection === -1 ? undefined : nextSection).trim() + "\n";
            }
            const releaseRequest = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              body: notes,
              draft: false,
              prerelease: false,
            };

            try {
              const existing = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: existing.data.id,
                name: tag,
                body: notes,
                draft: false,
                prerelease: false,
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
              await github.rest.repos.createRelease(releaseRequest);
            }
