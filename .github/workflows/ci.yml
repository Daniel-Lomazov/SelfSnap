name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  compile:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Set up repository-local virtual environment
        run: .\scripts\user\setup.ps1 -PythonPreference "$env:pythonLocation\python.exe"
      - name: Compile smoke test
        run: .\.venv\Scripts\python.exe -m compileall src tests

  test:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version:
          - "3.11"
          - "3.12"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set up repository-local virtual environment
        run: .\scripts\user\setup.ps1 -PythonPreference "$env:pythonLocation\python.exe"
      - name: Pytest
        run: .\.venv\Scripts\python.exe -m pytest -q
