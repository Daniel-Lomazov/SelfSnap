repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff lint
        language: system
        entry: ruff check --fix
        types: [python]
        pass_filenames: true

      - id: ruff-format
        name: ruff format
        language: system
        entry: ruff format
        types: [python]
        pass_filenames: true

      - id: mypy
        name: mypy type check
        language: system
        entry: mypy src
        pass_filenames: false
        always_run: true
